<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="Lamb Insurance Agency logo">
  <!-- Badge / shield shape -->
  <path d="M16 44 Q16 12 48 12 L152 12 Q184 12 184 44 L184 132 Q184 180 100 208 Q16 180 16 132 Z" fill="#0e1c32"/>

  <!-- Sky (light blue circle) -->
  <circle cx="100" cy="88" r="64" fill="#7ab5d2"/>

  <!-- Cream arch background (upper half of circle) -->
  <path d="M36 88 Q36 24 100 24 Q164 24 164 88 Z" fill="#ddd3be"/>

  <!-- Rocky ground base inside badge -->
  <path d="M36 130 Q58 112 100 120 Q142 112 164 130 L164 170 Q132 200 100 208 Q68 200 36 170 Z" fill="#1d3452"/>

  <!-- Left rock formation -->
  <polygon points="36,130 64,106 78,126 60,130" fill="#25435e"/>

  <!-- Right rock formation -->
  <polygon points="164,130 136,106 122,126 140,130" fill="#25435e"/>

  <!-- Lamb body -->
  <ellipse cx="106" cy="112" rx="30" ry="17" fill="#ddd3be" transform="rotate(-6 106 112)"/>

  <!-- Wool / fluffy texture overlay -->
  <ellipse cx="100" cy="106" rx="27" ry="14" fill="#e8e0cf"/>

  <!-- Lamb neck -->
  <path d="M124 101 Q132 96 134 104" stroke="#ddd3be" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Lamb head -->
  <ellipse cx="136" cy="95" rx="15" ry="13" fill="#ddd3be"/>

  <!-- Lamb ear -->
  <ellipse cx="126" cy="85" rx="6" ry="9" fill="#c4b09a" transform="rotate(-25 126 85)"/>

  <!-- Lamb eye -->
  <circle cx="141" cy="93" r="2.5" fill="#0e1c32"/>
  <circle cx="142" cy="92" r="1" fill="white" opacity="0.6"/>

  <!-- Lamb horn (curled) -->
  <path d="M143 84 Q154 74 150 87" stroke="#b09880" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Snout -->
  <ellipse cx="149" cy="99" rx="8" ry="6" fill="#ccc0aa"/>
  <circle cx="151" cy="99" r="1.5" fill="#9a8878"/>

  <!-- Lamb tail -->
  <ellipse cx="78" cy="108" rx="9" ry="8" fill="#ddd3be"/>

  <!-- Front legs (stepping up on rock) -->
  <line x1="128" y1="127" x2="127" y2="148" stroke="#ddd3be" stroke-width="7" stroke-linecap="round"/>
  <line x1="116" y1="128" x2="114" y2="149" stroke="#ddd3be" stroke-width="7" stroke-linecap="round"/>

  <!-- Back legs -->
  <line x1="92" y1="127" x2="90" y2="148" stroke="#ddd3be" stroke-width="7" stroke-linecap="round"/>
  <line x1="80" y1="124" x2="78" y2="145" stroke="#ddd3be" stroke-width="7" stroke-linecap="round"/>

  <!-- Hooves -->
  <rect x="123" y="144" width="8" height="6" rx="2" fill="#8a7868"/>
  <rect x="110" y="145" width="8" height="6" rx="2" fill="#8a7868"/>
  <rect x="86" y="144" width="8" height="6" rx="2" fill="#8a7868"/>
  <rect x="74" y="141" width="8" height="6" rx="2" fill="#8a7868"/>
</svg>
